        - heading "Protocolos de Excelencia" [level=3] [ref=e41]
        - paragraph [ref=e42]: Mantenemos una estandarización rigurosa y control de calidad en cada terapia. Nuestros protocolos siguen los más altos estándares internacionales de seguridad y eficacia.
      - generic [ref=e43]:
