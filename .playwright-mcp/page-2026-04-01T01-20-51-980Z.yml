  - generic [ref=e257]:
    - heading "Preguntas Frecuentes" [level=2] [ref=e258]
    - generic [ref=e259]:
      - generic [ref=e260]:
        - button "¿Con qué frecuencia se hacen las terapias IV? +" [ref=e261] [cursor=pointer]:
          - generic [ref=e262]: ¿Con qué frecuencia se hacen las terapias IV?
          - generic [ref=e263]: +
        - paragraph [ref=e264]: La frecuencia depende de tu estado de salud actual y tus objetivos específicos. Generalmente, iniciamos con una fase intensiva semanal o quincenal para optimizar niveles, y posteriormente pasamos a un protocolo de mantenimiento mensual. Durante tu consulta inicial, diseñamos un plan personalizado basado en tus análisis de laboratorio y necesidades individuales.
      - generic [ref=e265]:
        - button "¿Existen efectos secundarios? +" [ref=e266] [cursor=pointer]:
          - generic [ref=e267]: ¿Existen efectos secundarios?
          - generic [ref=e268]: +
        - paragraph [ref=e269]: Las terapias intravenosas son muy seguras cuando se administran por profesionales capacitados. Ocasionalmente puede haber ligera molestia en el sitio de punción o una sensación temporal de calor durante la infusión, síntomas que son completamente pasajeros. Seguimos protocolos estrictos de seguridad y realizamos evaluación médica completa antes de cualquier tratamiento para minimizar cualquier riesgo.
      - generic [ref=e270]:
        - button "¿Cuál es la diferencia entre vía oral e intravenosa? +" [ref=e271] [cursor=pointer]:
          - generic [ref=e272]: ¿Cuál es la diferencia entre vía oral e intravenosa?
          - generic [ref=e273]: +
        - paragraph [ref=e274]: La diferencia es significativa. La vía intravenosa asegura absorción del 100% de los nutrientes directamente al torrente sanguíneo, resultando en efectos más rápidos y niveles terapéuticos mucho más altos. La vía oral depende de la digestión y puede tener una absorción de solo 10-30%, especialmente en personas con problemas intestinales. Para objetivos terapéuticos serios, la vía IV es incomparablemente más efectiva.
      - generic [ref=e275]:
        - button "¿Se necesitan estudios previos? +" [ref=e276] [cursor=pointer]:
          - generic [ref=e277]: ¿Se necesitan estudios previos?
          - generic [ref=e278]: +
        - paragraph [ref=e279]: Sí, absolutamente. Realizamos una evaluación clínica completa y solicitamos estudios de laboratorio específicos antes de iniciar cualquier protocolo de terapia intravenosa. Esto nos permite personalizar completamente el tratamiento a tus necesidades únicas, identificar deficiencias específicas y garantizar la máxima seguridad y efectividad. No trabajamos con protocolos genéricos; cada plan es diseñado científicamente para ti.
      - generic [ref=e280]:
        - button "¿Cuándo notaré los beneficios? +" [ref=e281] [cursor=pointer]:
          - generic [ref=e282]: ¿Cuándo notaré los beneficios?
          - generic [ref=e283]: +
        - paragraph [ref=e284]: El tiempo de respuesta varía según la terapia y tu estado inicial. Muchos pacientes experimentan mejoras notables de energía y claridad mental desde la primera sesión, especialmente con terapias como Myers' Cocktail, NAD+ o Rehydration. Beneficios más profundos como optimización inmunológica, reparación celular y mejoras metabólicas se perciben gradualmente a lo largo de varias sesiones. El monitoreo continuo nos permite ajustar el protocolo para resultados óptimos.
      - generic [ref=e285]:
        - button "¿Se puede combinar con tratamientos médicos actuales? +" [ref=e286] [cursor=pointer]:
          - generic [ref=e287]: ¿Se puede combinar con tratamientos médicos actuales?
          - generic [ref=e288]: +
        - paragraph [ref=e289]: Sí, la terapia intravenosa es altamente complementaria con la medicina convencional. De hecho, puede potenciar muchos tratamientos tradicionales y acelerar la recuperación. Trabajamos en coordinación con tu equipo médico actual para asegurar un enfoque integrado y seguro. Es importante informarnos sobre todos tus medicamentos actuales durante la evaluación inicial para optimizar la sinergia terapéutica.
      - generic [ref=e290]:
        - button "¿Hay contraindicaciones? +" [ref=e291] [cursor=pointer]:
          - generic [ref=e292]: ¿Hay contraindicaciones?
          - generic [ref=e293]: +
        - paragraph [ref=e294]: Las contraindicaciones dependen de cada terapia específica. Personas con insuficiencia renal, hepática o cardiaca severa pueden requerir protocolos especiales o ajustes de dosis. Ciertas terapias no se recomiendan durante el embarazo o lactancia. Por esto es esencial la valoración médica inicial completa, donde evaluamos tu historial clínico detallado, medicaciones actuales y resultados de laboratorio para determinar el protocolo más seguro y efectivo para ti.
