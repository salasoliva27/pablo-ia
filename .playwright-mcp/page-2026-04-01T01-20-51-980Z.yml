        - paragraph [ref=e46]: Diseñamos planes integrales adaptados a tus necesidades individuales, enfocados en longevidad, energía y bienestar sostenible. Te acompañamos en cada paso de tu transformación.
      - generic [ref=e47]:
        - generic [ref=e48]: 🌟
