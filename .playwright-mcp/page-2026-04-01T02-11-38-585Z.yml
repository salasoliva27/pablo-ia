  - generic [ref=e74]:
    - heading "Condiciones Frecuentes que Tratamos" [level=2] [ref=e75]
    - generic [ref=e76]:
      - generic [ref=e77]:
        - generic [ref=e78] [cursor=pointer]:
          - generic [ref=e79]: Fatiga crónica
          - generic [ref=e80]: +
        - paragraph [ref=e81]: Estado de agotamiento persistente que no mejora con descanso. Abordamos las causas subyacentes como deficiencias nutricionales, disfunción mitocondrial y desequilibrios hormonales para restaurar tus niveles de energía.
      - generic [ref=e82]:
        - generic [ref=e83] [cursor=pointer]:
          - generic [ref=e84]: Salud intestinal
          - generic [ref=e85]: +
        - paragraph [ref=e86]: El intestino es fundamental para la inmunidad y el bienestar general. Tratamos disbiosis, permeabilidad intestinal y problemas digestivos con protocolos personalizados que restauran el equilibrio del microbioma.
      - generic [ref=e87]:
        - generic [ref=e88] [cursor=pointer]:
          - generic [ref=e89]: Neuroprotección
          - generic [ref=e90]: +
        - paragraph [ref=e91]: Protegemos la función cerebral y prevenimos el deterioro cognitivo mediante terapias que optimizan la salud neuronal, reducen la neuroinflamación y apoyan la plasticidad cerebral para mantener tu mente aguda.
      - generic [ref=e92]:
        - generic [ref=e93] [cursor=pointer]:
          - generic [ref=e94]: Higiene del sueño
          - generic [ref=e95]: +
        - paragraph [ref=e96]: El sueño reparador es esencial para la longevidad. Identificamos alteraciones del ritmo circadiano, deficiencias de neurotransmisores y factores ambientales que afectan tu descanso para mejorar la calidad del sueño.
      - generic [ref=e97]:
        - generic [ref=e98] [cursor=pointer]:
          - generic [ref=e99]: Deshidratación
          - generic [ref=e100]: +
        - paragraph [ref=e101]: La hidratación celular óptima es vital para todas las funciones corporales. Corregimos desequilibrios de electrolitos y volumen con terapia intravenosa que restaura la hidratación a nivel celular rápidamente.
      - generic [ref=e102]:
        - generic [ref=e103] [cursor=pointer]:
          - generic [ref=e104]: Salud preventiva
          - generic [ref=e105]: +
        - paragraph [ref=e106]: Anticiparse a las enfermedades es más efectivo que tratarlas. Realizamos análisis avanzados para detectar desequilibrios tempranos y diseñamos intervenciones preventivas personalizadas basadas en tu perfil único.
      - generic [ref=e107]:
        - generic [ref=e108] [cursor=pointer]:
          - generic [ref=e109]: Salud cardiovascular
          - generic [ref=e110]: +
        - paragraph [ref=e111]: Optimizamos la salud del corazón y los vasos sanguíneos mediante control de inflamación vascular, gestión de lípidos y mejora de la función endotelial para prevenir enfermedades cardiovasculares.
      - generic [ref=e112]:
        - generic [ref=e113] [cursor=pointer]:
          - generic [ref=e114]: Resistencia a la insulina
          - generic [ref=e115]: +
        - paragraph [ref=e116]: Precursor de diabetes tipo 2 y síndrome metabólico. Revertimos la resistencia a la insulina con intervenciones nutricionales, suplementación dirigida y optimización del metabolismo de la glucosa.
      - generic [ref=e117]:
        - generic [ref=e118] [cursor=pointer]:
          - generic [ref=e119]: Metabolismo y Energía
          - generic [ref=e120]: +
        - paragraph [ref=e121]: Optimizamos la función mitocondrial, la producción de ATP y el metabolismo celular para maximizar tus niveles de energía, mejorar la composición corporal y acelerar la recuperación física.
      - generic [ref=e122]:
        - generic [ref=e123] [cursor=pointer]:
          - generic [ref=e124]: Salud Cerebral y Cognitiva
          - generic [ref=e125]: +
        - paragraph [ref=e126]: Mejoramos memoria, concentración y claridad mental mediante apoyo neurológico integral. Abordamos inflamación cerebral, optimización de neurotransmisores y nutrición cerebral para rendimiento cognitivo óptimo.
      - generic [ref=e127]:
        - generic [ref=e128] [cursor=pointer]:
          - generic [ref=e129]: Inmunidad y Regulación Inflamatoria
          - generic [ref=e130]: +
        - paragraph [ref=e131]: Fortalecemos las defensas naturales y modulamos la inflamación crónica que subyace a muchas enfermedades. Equilibramos la respuesta inmune para protección óptima sin sobreactivación.
      - generic [ref=e132]:
        - generic [ref=e133] [cursor=pointer]:
          - generic [ref=e134]: Salud Ósea y Musculoesquelética
          - generic [ref=e135]: +
        - paragraph [ref=e136]: Preservamos densidad ósea, función muscular y salud articular mediante nutrición específica, optimización hormonal y suplementación dirigida para mantener movilidad y fuerza con el tiempo.
      - generic [ref=e137]:
        - generic [ref=e138] [cursor=pointer]:
          - generic [ref=e139]: Deficiencia de vitamina D
          - generic [ref=e140]: +
        - paragraph [ref=e141]: Condición extremadamente común que afecta inmunidad, estado de ánimo y salud ósea. Corregimos niveles mediante suplementación adecuada y monitoreo para alcanzar rangos óptimos, no solo normales.
      - generic [ref=e142]:
        - generic [ref=e143] [cursor=pointer]:
          - generic [ref=e144]: Ferropenia sin anemia
          - generic [ref=e145]: +
        - paragraph [ref=e146]: Deficiencia de hierro que causa fatiga y bajo rendimiento incluso antes de desarrollar anemia. Restauramos reservas de hierro con terapia intravenosa para recuperación rápida y efectiva.
      - generic [ref=e147]:
        - generic [ref=e148] [cursor=pointer]:
          - generic [ref=e149]: Estilo de Vida y Hábitos
          - generic [ref=e150]: +
        - paragraph [ref=e151]: Los hábitos diarios determinan tu salud a largo plazo. Te guiamos en optimización de nutrición, ejercicio, manejo del estrés y rutinas que promueven longevidad basándonos en evidencia científica.
      - generic [ref=e152]:
        - generic [ref=e153] [cursor=pointer]:
          - generic [ref=e154]: Prevención Avanzada
          - generic [ref=e155]: +
        - paragraph [ref=e156]: Utilizamos biomarcadores avanzados, análisis genético y evaluaciones funcionales para identificar riesgos años antes de que aparezcan síntomas, permitiendo intervención temprana y prevención efectiva.
      - generic [ref=e157]:
        - generic [ref=e158] [cursor=pointer]:
          - generic [ref=e159]: Recuperación en deportes de alto rendimiento
          - generic [ref=e160]: +
        - paragraph [ref=e161]: Aceleramos recuperación muscular, reducimos inflamación y optimizamos rendimiento atlético mediante terapias intravenosas, nutrición deportiva avanzada y protocolos de recuperación personalizados.
      - generic [ref=e162]:
        - generic [ref=e163] [cursor=pointer]:
          - generic [ref=e164]: Recuperación post-cirugía
          - generic [ref=e165]: +
        - paragraph [ref=e166]: Aceleramos cicatrización, fortalecemos el sistema inmune y restauramos la función normal tras procedimientos quirúrgicos con nutrición intravenosa, antioxidantes y protocolos de regeneración tisular.
