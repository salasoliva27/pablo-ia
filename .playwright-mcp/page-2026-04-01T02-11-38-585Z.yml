  - generic [ref=e29]:
    - heading "¿Quiénes Somos?" [level=2] [ref=e30]
    - paragraph [ref=e31]: En Longevité Therapeutics integramos medicina funcional, nutrición avanzada y ciencia de la longevidad para ayudarte a vivir más años con mayor vitalidad. Nuestro enfoque personalizado identifica las causas raíz de los desequilibrios de salud y ofrece terapias basadas en evidencia que optimizan tu bienestar a nivel celular.
    - img "Sala de espera Longevité Therapeutics" [ref=e33]
    - generic [ref=e34]:
      - generic [ref=e35]:
        - generic [ref=e36]: 🔬
        - heading "Ciencia de Vanguardia" [level=3] [ref=e37]
        - paragraph [ref=e38]: Utilizamos investigación avanzada y terapias respaldadas científicamente, incorporando los últimos hallazgos en medicina funcional y longevidad para ofrecerte tratamientos de clase mundial.
      - generic [ref=e39]:
        - generic [ref=e40]: ⚕️
        - heading "Protocolos de Excelencia" [level=3] [ref=e41]
        - paragraph [ref=e42]: Mantenemos una estandarización rigurosa y control de calidad en cada terapia. Nuestros protocolos siguen los más altos estándares internacionales de seguridad y eficacia.
      - generic [ref=e43]:
        - generic [ref=e44]: 💚
        - heading "Acompañamiento Personalizado" [level=3] [ref=e45]
        - paragraph [ref=e46]: Diseñamos planes integrales adaptados a tus necesidades individuales, enfocados en longevidad, energía y bienestar sostenible. Te acompañamos en cada paso de tu transformación.
      - generic [ref=e47]:
        - generic [ref=e48]: 🌟
        - heading "Comunidad Innovadora" [level=3] [ref=e49]
        - paragraph [ref=e50]: Formamos parte de una red global de medicina funcional en constante evolución. Compartimos conocimiento y mejores prácticas para guiarte hacia una vida más larga y plena.
    - generic [ref=e52]:
      - heading "Respaldados por los protocolos del Dr. Terry Grossman" [level=3] [ref=e53]
      - paragraph [ref=e54]: Autoridad global en longevidad y medicina funcional desde 1970, coautor con Ray Kurzweil de obras fundamentales sobre extensión de la vida. Integramos sus protocolos con inteligencia artificial y los más altos estándares internacionales de seguridad para garantizar resultados óptimos.
