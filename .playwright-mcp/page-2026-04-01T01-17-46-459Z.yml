  - generic [ref=e94]:
    - heading "Condiciones Frecuentes que Tratamos" [level=2] [ref=e95]
    - generic [ref=e96]:
      - generic [ref=e97]:
        - generic [ref=e98] [cursor=pointer]:
          - generic [ref=e99]: Fatiga crónica
          - generic [ref=e100]: +
        - paragraph [ref=e101]: Estado de agotamiento persistente que no mejora con descanso. Abordamos las causas subyacentes como deficiencias nutricionales, disfunción mitocondrial y desequilibrios hormonales para restaurar tus niveles de energía.
      - generic [ref=e102]:
        - generic [ref=e103] [cursor=pointer]:
          - generic [ref=e104]: Salud intestinal
          - generic [ref=e105]: +
        - paragraph [ref=e106]: El intestino es fundamental para la inmunidad y el bienestar general. Tratamos disbiosis, permeabilidad intestinal y problemas digestivos con protocolos personalizados que restauran el equilibrio del microbioma.
      - generic [ref=e107]:
        - generic [ref=e108] [cursor=pointer]:
          - generic [ref=e109]: Neuroprotección
          - generic [ref=e110]: +
        - paragraph [ref=e111]: Protegemos la función cerebral y prevenimos el deterioro cognitivo mediante terapias que optimizan la salud neuronal, reducen la neuroinflamación y apoyan la plasticidad cerebral para mantener tu mente aguda.
      - generic [ref=e112]:
        - generic [ref=e113] [cursor=pointer]:
          - generic [ref=e114]: Higiene del sueño
          - generic [ref=e115]: +
        - paragraph [ref=e116]: El sueño reparador es esencial para la longevidad. Identificamos alteraciones del ritmo circadiano, deficiencias de neurotransmisores y factores ambientales que afectan tu descanso para mejorar la calidad del sueño.
      - generic [ref=e117]:
        - generic [ref=e118] [cursor=pointer]:
          - generic [ref=e119]: Deshidratación
          - generic [ref=e120]: +
        - paragraph [ref=e121]: La hidratación celular óptima es vital para todas las funciones corporales. Corregimos desequilibrios de electrolitos y volumen con terapia intravenosa que restaura la hidratación a nivel celular rápidamente.
      - generic [ref=e122]:
        - generic [ref=e123] [cursor=pointer]:
          - generic [ref=e124]: Salud preventiva
          - generic [ref=e125]: +
        - paragraph [ref=e126]: Anticiparse a las enfermedades es más efectivo que tratarlas. Realizamos análisis avanzados para detectar desequilibrios tempranos y diseñamos intervenciones preventivas personalizadas basadas en tu perfil único.
      - generic [ref=e127]:
        - generic [ref=e128] [cursor=pointer]:
          - generic [ref=e129]: Salud cardiovascular
          - generic [ref=e130]: +
        - paragraph [ref=e131]: Optimizamos la salud del corazón y los vasos sanguíneos mediante control de inflamación vascular, gestión de lípidos y mejora de la función endotelial para prevenir enfermedades cardiovasculares.
      - generic [ref=e132]:
        - generic [ref=e133] [cursor=pointer]:
          - generic [ref=e134]: Resistencia a la insulina
          - generic [ref=e135]: +
        - paragraph [ref=e136]: Precursor de diabetes tipo 2 y síndrome metabólico. Revertimos la resistencia a la insulina con intervenciones nutricionales, suplementación dirigida y optimización del metabolismo de la glucosa.
      - generic [ref=e137]:
        - generic [ref=e138] [cursor=pointer]:
          - generic [ref=e139]: Metabolismo y Energía
          - generic [ref=e140]: +
        - paragraph [ref=e141]: Optimizamos la función mitocondrial, la producción de ATP y el metabolismo celular para maximizar tus niveles de energía, mejorar la composición corporal y acelerar la recuperación física.
      - generic [ref=e142]:
        - generic [ref=e143] [cursor=pointer]:
          - generic [ref=e144]: Salud Cerebral y Cognitiva
          - generic [ref=e145]: +
        - paragraph [ref=e146]: Mejoramos memoria, concentración y claridad mental mediante apoyo neurológico integral. Abordamos inflamación cerebral, optimización de neurotransmisores y nutrición cerebral para rendimiento cognitivo óptimo.
      - generic [ref=e147]:
        - generic [ref=e148] [cursor=pointer]:
          - generic [ref=e149]: Inmunidad y Regulación Inflamatoria
          - generic [ref=e150]: +
        - paragraph [ref=e151]: Fortalecemos las defensas naturales y modulamos la inflamación crónica que subyace a muchas enfermedades. Equilibramos la respuesta inmune para protección óptima sin sobreactivación.
      - generic [ref=e152]:
        - generic [ref=e153] [cursor=pointer]:
          - generic [ref=e154]: Salud Ósea y Musculoesquelética
          - generic [ref=e155]: +
        - paragraph [ref=e156]: Preservamos densidad ósea, función muscular y salud articular mediante nutrición específica, optimización hormonal y suplementación dirigida para mantener movilidad y fuerza con el tiempo.
      - generic [ref=e157]:
        - generic [ref=e158] [cursor=pointer]:
          - generic [ref=e159]: Deficiencia de vitamina D
          - generic [ref=e160]: +
        - paragraph [ref=e161]: Condición extremadamente común que afecta inmunidad, estado de ánimo y salud ósea. Corregimos niveles mediante suplementación adecuada y monitoreo para alcanzar rangos óptimos, no solo normales.
      - generic [ref=e162]:
        - generic [ref=e163] [cursor=pointer]:
          - generic [ref=e164]: Ferropenia sin anemia
          - generic [ref=e165]: +
        - paragraph [ref=e166]: Deficiencia de hierro que causa fatiga y bajo rendimiento incluso antes de desarrollar anemia. Restauramos reservas de hierro con terapia intravenosa para recuperación rápida y efectiva.
      - generic [ref=e167]:
        - generic [ref=e168] [cursor=pointer]:
          - generic [ref=e169]: Estilo de Vida y Hábitos
          - generic [ref=e170]: +
        - paragraph [ref=e171]: Los hábitos diarios determinan tu salud a largo plazo. Te guiamos en optimización de nutrición, ejercicio, manejo del estrés y rutinas que promueven longevidad basándonos en evidencia científica.
      - generic [ref=e172]:
        - generic [ref=e173] [cursor=pointer]:
          - generic [ref=e174]: Prevención Avanzada
          - generic [ref=e175]: +
        - paragraph [ref=e176]: Utilizamos biomarcadores avanzados, análisis genético y evaluaciones funcionales para identificar riesgos años antes de que aparezcan síntomas, permitiendo intervención temprana y prevención efectiva.
      - generic [ref=e177]:
        - generic [ref=e178] [cursor=pointer]:
          - generic [ref=e179]: Recuperación en deportes de alto rendimiento
          - generic [ref=e180]: +
        - paragraph [ref=e181]: Aceleramos recuperación muscular, reducimos inflamación y optimizamos rendimiento atlético mediante terapias intravenosas, nutrición deportiva avanzada y protocolos de recuperación personalizados.
      - generic [ref=e182]:
        - generic [ref=e183] [cursor=pointer]:
          - generic [ref=e184]: Recuperación post-cirugía
          - generic [ref=e185]: +
        - paragraph [ref=e186]: Aceleramos cicatrización, fortalecemos el sistema inmune y restauramos la función normal tras procedimientos quirúrgicos con nutrición intravenosa, antioxidantes y protocolos de regeneración tisular.
  - generic [ref=e188]:
    - heading "Conoce Nuestras Terapias Intravenosas" [level=2] [ref=e189]
