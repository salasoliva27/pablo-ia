        - heading "Myers' Cocktail" [level=3] [ref=e194]
        - paragraph [ref=e195]: Mezcla clásica de vitaminas y minerales esenciales que potencia la energía celular y promueve el bienestar general. Ideal para recuperación, vitalidad y soporte inmunológico.
      - generic [ref=e196]:
        - generic [ref=e197]: ✨
        - heading "Glutatión" [level=3] [ref=e198]
        - paragraph [ref=e199]: Antioxidante maestro del cuerpo, fundamental para la detoxificación celular profunda, protección contra el estrés oxidativo y optimización de la salud hepática. Mejora la calidad de la piel y apoya la función inmune.
      - generic [ref=e200]:
        - generic [ref=e201]: ⚡
        - heading "NAD+" [level=3] [ref=e202]
        - paragraph [ref=e203]: Coenzima crítica que apoya el metabolismo energético mitocondrial, la reparación del ADN y las funciones celulares de longevidad. Esencial para combatir el envejecimiento a nivel molecular y mejorar la función cognitiva.
      - generic [ref=e204]:
        - generic [ref=e205]: 🍊
        - heading "Vitamina C IV" [level=3] [ref=e206]
        - paragraph [ref=e207]: Refuerzo antioxidante de alto impacto que fortalece el sistema inmunológico, acelera la síntesis de colágeno y protege contra el daño celular. Alcanza niveles terapéuticos imposibles por vía oral.
      - generic [ref=e208]:
        - generic [ref=e209]: 💦
        - heading "Rehydration IV" [level=3] [ref=e210]
        - paragraph [ref=e211]: Hidratación rápida y completa con reposición inmediata de electrolitos esenciales. Perfecta para recuperación deportiva, jet lag, deshidratación severa o preparación antes de eventos importantes.
      - generic [ref=e212]:
        - generic [ref=e213]: 🌟
        - heading "Hangover" [level=3] [ref=e214]
        - paragraph [ref=e215]: Recuperación acelerada de energía, hidratación profunda y reposición de electrolitos y vitaminas clave. Alivia síntomas rápidamente para que recuperes tu día con vitalidad.
      - generic [ref=e216]:
        - generic [ref=e217]: 🌸
        - heading "Anti-Aging" [level=3] [ref=e218]
        - paragraph [ref=e219]: Fórmula especializada con nutrientes específicos para rejuvenecimiento celular, refuerzo antioxidante intensivo y protección contra el daño del envejecimiento. Optimiza la salud de la piel, energía y vitalidad desde el interior.
      - generic [ref=e220]:
        - generic [ref=e221]: 🛡️
        - heading "Immune Recover" [level=3] [ref=e222]
        - paragraph [ref=e223]: Potente refuerzo inmunológico y recuperación acelerada de defensas naturales. Combina vitaminas, minerales y antioxidantes clave para fortalecer tu sistema inmune ante desafíos virales o bacterianos.
      - generic [ref=e224]:
        - generic [ref=e225]: 🩸
        - heading "Iron IV" [level=3] [ref=e226]
        - paragraph [ref=e227]: Corrección efectiva de deficiencia de hierro y ferropenia, mejorando rápidamente los niveles de energía, función cognitiva y capacidad física. Ideal cuando la suplementación oral no es suficiente o bien tolerada.
