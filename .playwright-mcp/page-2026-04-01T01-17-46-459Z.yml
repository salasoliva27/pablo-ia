  - generic [ref=e277]:
    - heading "Preguntas Frecuentes" [level=2] [ref=e278]
    - generic [ref=e279]:
      - generic [ref=e280]:
        - button "¿Con qué frecuencia se hacen las terapias IV? +" [ref=e281] [cursor=pointer]:
          - generic [ref=e282]: ¿Con qué frecuencia se hacen las terapias IV?
          - generic [ref=e283]: +
        - paragraph [ref=e284]: La frecuencia depende de tu estado de salud actual y tus objetivos específicos. Generalmente, iniciamos con una fase intensiva semanal o quincenal para optimizar niveles, y posteriormente pasamos a un protocolo de mantenimiento mensual. Durante tu consulta inicial, diseñamos un plan personalizado basado en tus análisis de laboratorio y necesidades individuales.
      - generic [ref=e285]:
        - button "¿Existen efectos secundarios? +" [ref=e286] [cursor=pointer]:
          - generic [ref=e287]: ¿Existen efectos secundarios?
          - generic [ref=e288]: +
        - paragraph [ref=e289]: Las terapias intravenosas son muy seguras cuando se administran por profesionales capacitados. Ocasionalmente puede haber ligera molestia en el sitio de punción o una sensación temporal de calor durante la infusión, síntomas que son completamente pasajeros. Seguimos protocolos estrictos de seguridad y realizamos evaluación médica completa antes de cualquier tratamiento para minimizar cualquier riesgo.
      - generic [ref=e290]:
        - button "¿Cuál es la diferencia entre vía oral e intravenosa? +" [ref=e291] [cursor=pointer]:
          - generic [ref=e292]: ¿Cuál es la diferencia entre vía oral e intravenosa?
          - generic [ref=e293]: +
        - paragraph [ref=e294]: La diferencia es significativa. La vía intravenosa asegura absorción del 100% de los nutrientes directamente al torrente sanguíneo, resultando en efectos más rápidos y niveles terapéuticos mucho más altos. La vía oral depende de la digestión y puede tener una absorción de solo 10-30%, especialmente en personas con problemas intestinales. Para objetivos terapéuticos serios, la vía IV es incomparablemente más efectiva.
      - generic [ref=e295]:
        - button "¿Se necesitan estudios previos? +" [ref=e296] [cursor=pointer]:
          - generic [ref=e297]: ¿Se necesitan estudios previos?
          - generic [ref=e298]: +
        - paragraph [ref=e299]: Sí, absolutamente. Realizamos una evaluación clínica completa y solicitamos estudios de laboratorio específicos antes de iniciar cualquier protocolo de terapia intravenosa. Esto nos permite personalizar completamente el tratamiento a tus necesidades únicas, identificar deficiencias específicas y garantizar la máxima seguridad y efectividad. No trabajamos con protocolos genéricos; cada plan es diseñado científicamente para ti.
      - generic [ref=e300]:
        - button "¿Cuándo notaré los beneficios? +" [ref=e301] [cursor=pointer]:
          - generic [ref=e302]: ¿Cuándo notaré los beneficios?
          - generic [ref=e303]: +
        - paragraph [ref=e304]: El tiempo de respuesta varía según la terapia y tu estado inicial. Muchos pacientes experimentan mejoras notables de energía y claridad mental desde la primera sesión, especialmente con terapias como Myers' Cocktail, NAD+ o Rehydration. Beneficios más profundos como optimización inmunológica, reparación celular y mejoras metabólicas se perciben gradualmente a lo largo de varias sesiones. El monitoreo continuo nos permite ajustar el protocolo para resultados óptimos.
      - generic [ref=e305]:
        - button "¿Se puede combinar con tratamientos médicos actuales? +" [ref=e306] [cursor=pointer]:
          - generic [ref=e307]: ¿Se puede combinar con tratamientos médicos actuales?
          - generic [ref=e308]: +
        - paragraph [ref=e309]: Sí, la terapia intravenosa es altamente complementaria con la medicina convencional. De hecho, puede potenciar muchos tratamientos tradicionales y acelerar la recuperación. Trabajamos en coordinación con tu equipo médico actual para asegurar un enfoque integrado y seguro. Es importante informarnos sobre todos tus medicamentos actuales durante la evaluación inicial para optimizar la sinergia terapéutica.
      - generic [ref=e310]:
        - button "¿Hay contraindicaciones? +" [ref=e311] [cursor=pointer]:
          - generic [ref=e312]: ¿Hay contraindicaciones?
          - generic [ref=e313]: +
        - paragraph [ref=e314]: Las contraindicaciones dependen de cada terapia específica. Personas con insuficiencia renal, hepática o cardiaca severa pueden requerir protocolos especiales o ajustes de dosis. Ciertas terapias no se recomiendan durante el embarazo o lactancia. Por esto es esencial la valoración médica inicial completa, donde evaluamos tu historial clínico detallado, medicaciones actuales y resultados de laboratorio para determinar el protocolo más seguro y efectivo para ti.
