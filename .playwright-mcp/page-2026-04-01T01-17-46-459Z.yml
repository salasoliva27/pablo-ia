  - generic [ref=e49]:
    - heading "¿Quiénes Somos?" [level=2] [ref=e50]
    - paragraph [ref=e51]: En Longevité Therapeutics integramos medicina funcional, nutrición avanzada y ciencia de la longevidad para ayudarte a vivir más años con mayor vitalidad. Nuestro enfoque personalizado identifica las causas raíz de los desequilibrios de salud y ofrece terapias basadas en evidencia que optimizan tu bienestar a nivel celular.
    - img "Sala de espera Longevité Therapeutics" [ref=e53]
    - generic [ref=e54]:
      - generic [ref=e55]:
        - generic [ref=e56]: 🔬
        - heading "Ciencia de Vanguardia" [level=3] [ref=e57]
        - paragraph [ref=e58]: Utilizamos investigación avanzada y terapias respaldadas científicamente, incorporando los últimos hallazgos en medicina funcional y longevidad para ofrecerte tratamientos de clase mundial.
      - generic [ref=e59]:
        - generic [ref=e60]: ⚕️
        - heading "Protocolos de Excelencia" [level=3] [ref=e61]
        - paragraph [ref=e62]: Mantenemos una estandarización rigurosa y control de calidad en cada terapia. Nuestros protocolos siguen los más altos estándares internacionales de seguridad y eficacia.
      - generic [ref=e63]:
        - generic [ref=e64]: 💚
        - heading "Acompañamiento Personalizado" [level=3] [ref=e65]
        - paragraph [ref=e66]: Diseñamos planes integrales adaptados a tus necesidades individuales, enfocados en longevidad, energía y bienestar sostenible. Te acompañamos en cada paso de tu transformación.
      - generic [ref=e67]:
        - generic [ref=e68]: 🌟
        - heading "Comunidad Innovadora" [level=3] [ref=e69]
        - paragraph [ref=e70]: Formamos parte de una red global de medicina funcional en constante evolución. Compartimos conocimiento y mejores prácticas para guiarte hacia una vida más larga y plena.
    - generic [ref=e72]:
      - heading "Respaldados por los protocolos del Dr. Terry Grossman" [level=3] [ref=e73]
      - paragraph [ref=e74]: Autoridad global en longevidad y medicina funcional desde 1970, coautor con Ray Kurzweil de obras fundamentales sobre extensión de la vida. Integramos sus protocolos con inteligencia artificial y los más altos estándares internacionales de seguridad para garantizar resultados óptimos.
