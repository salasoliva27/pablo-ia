  - generic [ref=e33]:
    - heading "¿Quiénes Somos?" [level=2] [ref=e34]
    - paragraph [ref=e35]: En Longevité Therapeutics integramos medicina funcional, nutrición avanzada y ciencia de la longevidad para ayudarte a vivir más años con mayor vitalidad. Nuestro enfoque personalizado identifica las causas raíz de los desequilibrios de salud y ofrece terapias basadas en evidencia que optimizan tu bienestar a nivel celular.
