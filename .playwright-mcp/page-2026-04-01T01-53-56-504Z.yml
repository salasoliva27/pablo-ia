  - generic [ref=e78]:
    - heading "Condiciones Frecuentes que Tratamos" [level=2] [ref=e79]
    - generic [ref=e80]:
      - generic [ref=e81]:
        - generic [ref=e82] [cursor=pointer]:
          - generic [ref=e83]: Fatiga crónica
          - generic [ref=e84]: +
        - paragraph [ref=e85]: Estado de agotamiento persistente que no mejora con descanso. Abordamos las causas subyacentes como deficiencias nutricionales, disfunción mitocondrial y desequilibrios hormonales para restaurar tus niveles de energía.
      - generic [ref=e86]:
        - generic [ref=e87] [cursor=pointer]:
          - generic [ref=e88]: Salud intestinal
          - generic [ref=e89]: +
        - paragraph [ref=e90]: El intestino es fundamental para la inmunidad y el bienestar general. Tratamos disbiosis, permeabilidad intestinal y problemas digestivos con protocolos personalizados que restauran el equilibrio del microbioma.
      - generic [ref=e91]:
        - generic [ref=e92] [cursor=pointer]:
          - generic [ref=e93]: Neuroprotección
          - generic [ref=e94]: +
        - paragraph [ref=e95]: Protegemos la función cerebral y prevenimos el deterioro cognitivo mediante terapias que optimizan la salud neuronal, reducen la neuroinflamación y apoyan la plasticidad cerebral para mantener tu mente aguda.
      - generic [ref=e96]:
        - generic [ref=e97] [cursor=pointer]:
          - generic [ref=e98]: Higiene del sueño
          - generic [ref=e99]: +
        - paragraph [ref=e100]: El sueño reparador es esencial para la longevidad. Identificamos alteraciones del ritmo circadiano, deficiencias de neurotransmisores y factores ambientales que afectan tu descanso para mejorar la calidad del sueño.
      - generic [ref=e101]:
        - generic [ref=e102] [cursor=pointer]:
          - generic [ref=e103]: Deshidratación
          - generic [ref=e104]: +
        - paragraph [ref=e105]: La hidratación celular óptima es vital para todas las funciones corporales. Corregimos desequilibrios de electrolitos y volumen con terapia intravenosa que restaura la hidratación a nivel celular rápidamente.
      - generic [ref=e106]:
        - generic [ref=e107] [cursor=pointer]:
          - generic [ref=e108]: Salud preventiva
          - generic [ref=e109]: +
        - paragraph [ref=e110]: Anticiparse a las enfermedades es más efectivo que tratarlas. Realizamos análisis avanzados para detectar desequilibrios tempranos y diseñamos intervenciones preventivas personalizadas basadas en tu perfil único.
      - generic [ref=e111]:
        - generic [ref=e112] [cursor=pointer]:
          - generic [ref=e113]: Salud cardiovascular
          - generic [ref=e114]: +
        - paragraph [ref=e115]: Optimizamos la salud del corazón y los vasos sanguíneos mediante control de inflamación vascular, gestión de lípidos y mejora de la función endotelial para prevenir enfermedades cardiovasculares.
      - generic [ref=e116]:
        - generic [ref=e117] [cursor=pointer]:
          - generic [ref=e118]: Resistencia a la insulina
          - generic [ref=e119]: +
        - paragraph [ref=e120]: Precursor de diabetes tipo 2 y síndrome metabólico. Revertimos la resistencia a la insulina con intervenciones nutricionales, suplementación dirigida y optimización del metabolismo de la glucosa.
      - generic [ref=e121]:
        - generic [ref=e122] [cursor=pointer]:
          - generic [ref=e123]: Metabolismo y Energía
          - generic [ref=e124]: +
        - paragraph [ref=e125]: Optimizamos la función mitocondrial, la producción de ATP y el metabolismo celular para maximizar tus niveles de energía, mejorar la composición corporal y acelerar la recuperación física.
      - generic [ref=e126]:
        - generic [ref=e127] [cursor=pointer]:
          - generic [ref=e128]: Salud Cerebral y Cognitiva
          - generic [ref=e129]: +
        - paragraph [ref=e130]: Mejoramos memoria, concentración y claridad mental mediante apoyo neurológico integral. Abordamos inflamación cerebral, optimización de neurotransmisores y nutrición cerebral para rendimiento cognitivo óptimo.
      - generic [ref=e131]:
        - generic [ref=e132] [cursor=pointer]:
          - generic [ref=e133]: Inmunidad y Regulación Inflamatoria
          - generic [ref=e134]: +
        - paragraph [ref=e135]: Fortalecemos las defensas naturales y modulamos la inflamación crónica que subyace a muchas enfermedades. Equilibramos la respuesta inmune para protección óptima sin sobreactivación.
      - generic [ref=e136]:
        - generic [ref=e137] [cursor=pointer]:
          - generic [ref=e138]: Salud Ósea y Musculoesquelética
          - generic [ref=e139]: +
        - paragraph [ref=e140]: Preservamos densidad ósea, función muscular y salud articular mediante nutrición específica, optimización hormonal y suplementación dirigida para mantener movilidad y fuerza con el tiempo.
      - generic [ref=e141]:
        - generic [ref=e142] [cursor=pointer]:
          - generic [ref=e143]: Deficiencia de vitamina D
          - generic [ref=e144]: +
        - paragraph [ref=e145]: Condición extremadamente común que afecta inmunidad, estado de ánimo y salud ósea. Corregimos niveles mediante suplementación adecuada y monitoreo para alcanzar rangos óptimos, no solo normales.
      - generic [ref=e146]:
        - generic [ref=e147] [cursor=pointer]:
          - generic [ref=e148]: Ferropenia sin anemia
          - generic [ref=e149]: +
        - paragraph [ref=e150]: Deficiencia de hierro que causa fatiga y bajo rendimiento incluso antes de desarrollar anemia. Restauramos reservas de hierro con terapia intravenosa para recuperación rápida y efectiva.
      - generic [ref=e151]:
        - generic [ref=e152] [cursor=pointer]:
          - generic [ref=e153]: Estilo de Vida y Hábitos
          - generic [ref=e154]: +
        - paragraph [ref=e155]: Los hábitos diarios determinan tu salud a largo plazo. Te guiamos en optimización de nutrición, ejercicio, manejo del estrés y rutinas que promueven longevidad basándonos en evidencia científica.
      - generic [ref=e156]:
        - generic [ref=e157] [cursor=pointer]:
          - generic [ref=e158]: Prevención Avanzada
          - generic [ref=e159]: +
        - paragraph [ref=e160]: Utilizamos biomarcadores avanzados, análisis genético y evaluaciones funcionales para identificar riesgos años antes de que aparezcan síntomas, permitiendo intervención temprana y prevención efectiva.
      - generic [ref=e161]:
        - generic [ref=e162] [cursor=pointer]:
          - generic [ref=e163]: Recuperación en deportes de alto rendimiento
          - generic [ref=e164]: +
        - paragraph [ref=e165]: Aceleramos recuperación muscular, reducimos inflamación y optimizamos rendimiento atlético mediante terapias intravenosas, nutrición deportiva avanzada y protocolos de recuperación personalizados.
      - generic [ref=e166]:
        - generic [ref=e167] [cursor=pointer]:
          - generic [ref=e168]: Recuperación post-cirugía
          - generic [ref=e169]: +
        - paragraph [ref=e170]: Aceleramos cicatrización, fortalecemos el sistema inmune y restauramos la función normal tras procedimientos quirúrgicos con nutrición intravenosa, antioxidantes y protocolos de regeneración tisular.
  - generic [ref=e172]:
    - heading "Conoce Nuestras Terapias Intravenosas" [level=2] [ref=e173]
    - img "Sala de terapias IV Longevité Therapeutics" [ref=e175]
    - generic [ref=e176]:
      - generic [ref=e177]:
        - img "Myers' Cocktail IV Therapy" [ref=e386]
        - heading "Myers' Cocktail" [level=3] [ref=e178]
        - paragraph [ref=e179]: Mezcla clásica de vitaminas y minerales esenciales que potencia la energía celular y promueve el bienestar general. Ideal para recuperación, vitalidad y soporte inmunológico.
      - generic [ref=e180]:
        - generic [ref=e181]: ✨
        - heading "Glutatión" [level=3] [ref=e182]
        - paragraph [ref=e183]: Antioxidante maestro del cuerpo, fundamental para la detoxificación celular profunda, protección contra el estrés oxidativo y optimización de la salud hepática. Mejora la calidad de la piel y apoya la función inmune.
      - generic [ref=e184]:
        - generic [ref=e185]: ⚡
        - heading "NAD+" [level=3] [ref=e186]
        - paragraph [ref=e187]: Coenzima crítica que apoya el metabolismo energético mitocondrial, la reparación del ADN y las funciones celulares de longevidad. Esencial para combatir el envejecimiento a nivel molecular y mejorar la función cognitiva.
      - generic [ref=e188]:
        - generic [ref=e189]: 🍊
        - heading "Vitamina C IV" [level=3] [ref=e190]
        - paragraph [ref=e191]: Refuerzo antioxidante de alto impacto que fortalece el sistema inmunológico, acelera la síntesis de colágeno y protege contra el daño celular. Alcanza niveles terapéuticos imposibles por vía oral.
      - generic [ref=e192]:
        - generic [ref=e193]: 💦
        - heading "Rehydration IV" [level=3] [ref=e194]
        - paragraph [ref=e195]: Hidratación rápida y completa con reposición inmediata de electrolitos esenciales. Perfecta para recuperación deportiva, jet lag, deshidratación severa o preparación antes de eventos importantes.
      - generic [ref=e196]:
        - generic [ref=e197]: 🌟
        - heading "Hangover" [level=3] [ref=e198]
        - paragraph [ref=e199]: Recuperación acelerada de energía, hidratación profunda y reposición de electrolitos y vitaminas clave. Alivia síntomas rápidamente para que recuperes tu día con vitalidad.
      - generic [ref=e200]:
        - generic [ref=e201]: 🌸
        - heading "Anti-Aging" [level=3] [ref=e202]
        - paragraph [ref=e203]: Fórmula especializada con nutrientes específicos para rejuvenecimiento celular, refuerzo antioxidante intensivo y protección contra el daño del envejecimiento. Optimiza la salud de la piel, energía y vitalidad desde el interior.
      - generic [ref=e204]:
        - generic [ref=e205]: 🛡️
        - heading "Immune Recover" [level=3] [ref=e206]
        - paragraph [ref=e207]: Potente refuerzo inmunológico y recuperación acelerada de defensas naturales. Combina vitaminas, minerales y antioxidantes clave para fortalecer tu sistema inmune ante desafíos virales o bacterianos.
      - generic [ref=e208]:
        - generic [ref=e209]: 🩸
        - heading "Iron IV" [level=3] [ref=e210]
        - paragraph [ref=e211]: Corrección efectiva de deficiencia de hierro y ferropenia, mejorando rápidamente los niveles de energía, función cognitiva y capacidad física. Ideal cuando la suplementación oral no es suficiente o bien tolerada.
