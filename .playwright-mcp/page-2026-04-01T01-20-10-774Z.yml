        - heading "Myers' Cocktail" [level=3] [ref=e187]
        - paragraph [ref=e188]: Mezcla clásica de vitaminas y minerales esenciales que potencia la energía celular y promueve el bienestar general. Ideal para recuperación, vitalidad y soporte inmunológico.
      - generic [ref=e189]:
        - generic [ref=e190]: ✨
        - heading "Glutatión" [level=3] [ref=e191]
        - paragraph [ref=e192]: Antioxidante maestro del cuerpo, fundamental para la detoxificación celular profunda, protección contra el estrés oxidativo y optimización de la salud hepática. Mejora la calidad de la piel y apoya la función inmune.
      - generic [ref=e193]:
        - generic [ref=e194]: ⚡
        - heading "NAD+" [level=3] [ref=e195]
        - paragraph [ref=e196]: Coenzima crítica que apoya el metabolismo energético mitocondrial, la reparación del ADN y las funciones celulares de longevidad. Esencial para combatir el envejecimiento a nivel molecular y mejorar la función cognitiva.
      - generic [ref=e197]:
        - generic [ref=e198]: 🍊
        - heading "Vitamina C IV" [level=3] [ref=e199]
        - paragraph [ref=e200]: Refuerzo antioxidante de alto impacto que fortalece el sistema inmunológico, acelera la síntesis de colágeno y protege contra el daño celular. Alcanza niveles terapéuticos imposibles por vía oral.
      - generic [ref=e201]:
        - generic [ref=e202]: 💦
        - heading "Rehydration IV" [level=3] [ref=e203]
        - paragraph [ref=e204]: Hidratación rápida y completa con reposición inmediata de electrolitos esenciales. Perfecta para recuperación deportiva, jet lag, deshidratación severa o preparación antes de eventos importantes.
      - generic [ref=e205]:
        - generic [ref=e206]: 🌟
        - heading "Hangover" [level=3] [ref=e207]
        - paragraph [ref=e208]: Recuperación acelerada de energía, hidratación profunda y reposición de electrolitos y vitaminas clave. Alivia síntomas rápidamente para que recuperes tu día con vitalidad.
      - generic [ref=e209]:
        - generic [ref=e210]: 🌸
        - heading "Anti-Aging" [level=3] [ref=e211]
        - paragraph [ref=e212]: Fórmula especializada con nutrientes específicos para rejuvenecimiento celular, refuerzo antioxidante intensivo y protección contra el daño del envejecimiento. Optimiza la salud de la piel, energía y vitalidad desde el interior.
      - generic [ref=e213]:
        - generic [ref=e214]: 🛡️
        - heading "Immune Recover" [level=3] [ref=e215]
        - paragraph [ref=e216]: Potente refuerzo inmunológico y recuperación acelerada de defensas naturales. Combina vitaminas, minerales y antioxidantes clave para fortalecer tu sistema inmune ante desafíos virales o bacterianos.
      - generic [ref=e217]:
        - generic [ref=e218]: 🩸
        - heading "Iron IV" [level=3] [ref=e219]
        - paragraph [ref=e220]: Corrección efectiva de deficiencia de hierro y ferropenia, mejorando rápidamente los niveles de energía, función cognitiva y capacidad física. Ideal cuando la suplementación oral no es suficiente o bien tolerada.
