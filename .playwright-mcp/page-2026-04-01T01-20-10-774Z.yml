  - generic [ref=e87]:
    - heading "Condiciones Frecuentes que Tratamos" [level=2] [ref=e88]
    - generic [ref=e89]:
      - generic [ref=e90]:
        - generic [ref=e91] [cursor=pointer]:
          - generic [ref=e92]: Fatiga crónica
          - generic [ref=e93]: +
        - paragraph [ref=e94]: Estado de agotamiento persistente que no mejora con descanso. Abordamos las causas subyacentes como deficiencias nutricionales, disfunción mitocondrial y desequilibrios hormonales para restaurar tus niveles de energía.
      - generic [ref=e95]:
        - generic [ref=e96] [cursor=pointer]:
          - generic [ref=e97]: Salud intestinal
          - generic [ref=e98]: +
        - paragraph [ref=e99]: El intestino es fundamental para la inmunidad y el bienestar general. Tratamos disbiosis, permeabilidad intestinal y problemas digestivos con protocolos personalizados que restauran el equilibrio del microbioma.
      - generic [ref=e100]:
        - generic [ref=e101] [cursor=pointer]:
          - generic [ref=e102]: Neuroprotección
          - generic [ref=e103]: +
        - paragraph [ref=e104]: Protegemos la función cerebral y prevenimos el deterioro cognitivo mediante terapias que optimizan la salud neuronal, reducen la neuroinflamación y apoyan la plasticidad cerebral para mantener tu mente aguda.
      - generic [ref=e105]:
        - generic [ref=e106] [cursor=pointer]:
          - generic [ref=e107]: Higiene del sueño
          - generic [ref=e108]: +
        - paragraph [ref=e109]: El sueño reparador es esencial para la longevidad. Identificamos alteraciones del ritmo circadiano, deficiencias de neurotransmisores y factores ambientales que afectan tu descanso para mejorar la calidad del sueño.
      - generic [ref=e110]:
        - generic [ref=e111] [cursor=pointer]:
          - generic [ref=e112]: Deshidratación
          - generic [ref=e113]: +
        - paragraph [ref=e114]: La hidratación celular óptima es vital para todas las funciones corporales. Corregimos desequilibrios de electrolitos y volumen con terapia intravenosa que restaura la hidratación a nivel celular rápidamente.
      - generic [ref=e115]:
        - generic [ref=e116] [cursor=pointer]:
          - generic [ref=e117]: Salud preventiva
          - generic [ref=e118]: +
        - paragraph [ref=e119]: Anticiparse a las enfermedades es más efectivo que tratarlas. Realizamos análisis avanzados para detectar desequilibrios tempranos y diseñamos intervenciones preventivas personalizadas basadas en tu perfil único.
      - generic [ref=e120]:
        - generic [ref=e121] [cursor=pointer]:
          - generic [ref=e122]: Salud cardiovascular
          - generic [ref=e123]: +
        - paragraph [ref=e124]: Optimizamos la salud del corazón y los vasos sanguíneos mediante control de inflamación vascular, gestión de lípidos y mejora de la función endotelial para prevenir enfermedades cardiovasculares.
      - generic [ref=e125]:
        - generic [ref=e126] [cursor=pointer]:
          - generic [ref=e127]: Resistencia a la insulina
          - generic [ref=e128]: +
        - paragraph [ref=e129]: Precursor de diabetes tipo 2 y síndrome metabólico. Revertimos la resistencia a la insulina con intervenciones nutricionales, suplementación dirigida y optimización del metabolismo de la glucosa.
      - generic [ref=e130]:
        - generic [ref=e131] [cursor=pointer]:
          - generic [ref=e132]: Metabolismo y Energía
          - generic [ref=e133]: +
        - paragraph [ref=e134]: Optimizamos la función mitocondrial, la producción de ATP y el metabolismo celular para maximizar tus niveles de energía, mejorar la composición corporal y acelerar la recuperación física.
      - generic [ref=e135]:
        - generic [ref=e136] [cursor=pointer]:
          - generic [ref=e137]: Salud Cerebral y Cognitiva
          - generic [ref=e138]: +
        - paragraph [ref=e139]: Mejoramos memoria, concentración y claridad mental mediante apoyo neurológico integral. Abordamos inflamación cerebral, optimización de neurotransmisores y nutrición cerebral para rendimiento cognitivo óptimo.
      - generic [ref=e140]:
        - generic [ref=e141] [cursor=pointer]:
          - generic [ref=e142]: Inmunidad y Regulación Inflamatoria
          - generic [ref=e143]: +
        - paragraph [ref=e144]: Fortalecemos las defensas naturales y modulamos la inflamación crónica que subyace a muchas enfermedades. Equilibramos la respuesta inmune para protección óptima sin sobreactivación.
      - generic [ref=e145]:
        - generic [ref=e146] [cursor=pointer]:
          - generic [ref=e147]: Salud Ósea y Musculoesquelética
          - generic [ref=e148]: +
        - paragraph [ref=e149]: Preservamos densidad ósea, función muscular y salud articular mediante nutrición específica, optimización hormonal y suplementación dirigida para mantener movilidad y fuerza con el tiempo.
      - generic [ref=e150]:
        - generic [ref=e151] [cursor=pointer]:
          - generic [ref=e152]: Deficiencia de vitamina D
          - generic [ref=e153]: +
        - paragraph [ref=e154]: Condición extremadamente común que afecta inmunidad, estado de ánimo y salud ósea. Corregimos niveles mediante suplementación adecuada y monitoreo para alcanzar rangos óptimos, no solo normales.
      - generic [ref=e155]:
        - generic [ref=e156] [cursor=pointer]:
          - generic [ref=e157]: Ferropenia sin anemia
          - generic [ref=e158]: +
        - paragraph [ref=e159]: Deficiencia de hierro que causa fatiga y bajo rendimiento incluso antes de desarrollar anemia. Restauramos reservas de hierro con terapia intravenosa para recuperación rápida y efectiva.
      - generic [ref=e160]:
        - generic [ref=e161] [cursor=pointer]:
          - generic [ref=e162]: Estilo de Vida y Hábitos
          - generic [ref=e163]: +
        - paragraph [ref=e164]: Los hábitos diarios determinan tu salud a largo plazo. Te guiamos en optimización de nutrición, ejercicio, manejo del estrés y rutinas que promueven longevidad basándonos en evidencia científica.
      - generic [ref=e165]:
        - generic [ref=e166] [cursor=pointer]:
          - generic [ref=e167]: Prevención Avanzada
          - generic [ref=e168]: +
        - paragraph [ref=e169]: Utilizamos biomarcadores avanzados, análisis genético y evaluaciones funcionales para identificar riesgos años antes de que aparezcan síntomas, permitiendo intervención temprana y prevención efectiva.
      - generic [ref=e170]:
        - generic [ref=e171] [cursor=pointer]:
          - generic [ref=e172]: Recuperación en deportes de alto rendimiento
          - generic [ref=e173]: +
        - paragraph [ref=e174]: Aceleramos recuperación muscular, reducimos inflamación y optimizamos rendimiento atlético mediante terapias intravenosas, nutrición deportiva avanzada y protocolos de recuperación personalizados.
      - generic [ref=e175]:
        - generic [ref=e176] [cursor=pointer]:
          - generic [ref=e177]: Recuperación post-cirugía
          - generic [ref=e178]: +
        - paragraph [ref=e179]: Aceleramos cicatrización, fortalecemos el sistema inmune y restauramos la función normal tras procedimientos quirúrgicos con nutrición intravenosa, antioxidantes y protocolos de regeneración tisular.
  - generic [ref=e181]:
    - heading "Conoce Nuestras Terapias Intravenosas" [level=2] [ref=e182]
