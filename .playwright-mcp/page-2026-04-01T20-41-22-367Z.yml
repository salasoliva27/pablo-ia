  - generic [ref=e86]:
    - heading "Condiciones Frecuentes que Tratamos" [level=2] [ref=e87]
    - generic [ref=e88]:
      - generic [ref=e89]:
        - generic [ref=e90] [cursor=pointer]:
          - generic [ref=e91]: Fatiga crónica
          - generic [ref=e92]: +
        - paragraph [ref=e93]: Estado de agotamiento persistente que no mejora con descanso. Abordamos las causas subyacentes como deficiencias nutricionales, disfunción mitocondrial y desequilibrios hormonales para restaurar tus niveles de energía.
      - generic [ref=e94]:
        - generic [ref=e95] [cursor=pointer]:
          - generic [ref=e96]: Salud intestinal
          - generic [ref=e97]: +
        - paragraph [ref=e98]: El intestino es fundamental para la inmunidad y el bienestar general. Tratamos disbiosis, permeabilidad intestinal y problemas digestivos con protocolos personalizados que restauran el equilibrio del microbioma.
      - generic [ref=e99]:
        - generic [ref=e100] [cursor=pointer]:
          - generic [ref=e101]: Neuroprotección
          - generic [ref=e102]: +
        - paragraph [ref=e103]: Protegemos la función cerebral y prevenimos el deterioro cognitivo mediante terapias que optimizan la salud neuronal, reducen la neuroinflamación y apoyan la plasticidad cerebral para mantener tu mente aguda.
      - generic [ref=e104]:
        - generic [ref=e105] [cursor=pointer]:
          - generic [ref=e106]: Higiene del sueño
          - generic [ref=e107]: +
        - paragraph [ref=e108]: El sueño reparador es esencial para la longevidad. Identificamos alteraciones del ritmo circadiano, deficiencias de neurotransmisores y factores ambientales que afectan tu descanso para mejorar la calidad del sueño.
      - generic [ref=e109]:
        - generic [ref=e110] [cursor=pointer]:
          - generic [ref=e111]: Deshidratación
          - generic [ref=e112]: +
        - paragraph [ref=e113]: La hidratación celular óptima es vital para todas las funciones corporales. Corregimos desequilibrios de electrolitos y volumen con terapia intravenosa que restaura la hidratación a nivel celular rápidamente.
      - generic [ref=e114]:
        - generic [ref=e115] [cursor=pointer]:
          - generic [ref=e116]: Salud preventiva
          - generic [ref=e117]: +
        - paragraph [ref=e118]: Anticiparse a las enfermedades es más efectivo que tratarlas. Realizamos análisis avanzados para detectar desequilibrios tempranos y diseñamos intervenciones preventivas personalizadas basadas en tu perfil único.
      - generic [ref=e119]:
        - generic [ref=e120] [cursor=pointer]:
          - generic [ref=e121]: Salud cardiovascular
          - generic [ref=e122]: +
        - paragraph [ref=e123]: Optimizamos la salud del corazón y los vasos sanguíneos mediante control de inflamación vascular, gestión de lípidos y mejora de la función endotelial para prevenir enfermedades cardiovasculares.
      - generic [ref=e124]:
        - generic [ref=e125] [cursor=pointer]:
          - generic [ref=e126]: Resistencia a la insulina
          - generic [ref=e127]: +
        - paragraph [ref=e128]: Precursor de diabetes tipo 2 y síndrome metabólico. Revertimos la resistencia a la insulina con intervenciones nutricionales, suplementación dirigida y optimización del metabolismo de la glucosa.
      - generic [ref=e129]:
        - generic [ref=e130] [cursor=pointer]:
          - generic [ref=e131]: Metabolismo y Energía
          - generic [ref=e132]: +
        - paragraph [ref=e133]: Optimizamos la función mitocondrial, la producción de ATP y el metabolismo celular para maximizar tus niveles de energía, mejorar la composición corporal y acelerar la recuperación física.
      - generic [ref=e134]:
        - generic [ref=e135] [cursor=pointer]:
          - generic [ref=e136]: Salud Cerebral y Cognitiva
          - generic [ref=e137]: +
        - paragraph [ref=e138]: Mejoramos memoria, concentración y claridad mental mediante apoyo neurológico integral. Abordamos inflamación cerebral, optimización de neurotransmisores y nutrición cerebral para rendimiento cognitivo óptimo.
      - generic [ref=e139]:
        - generic [ref=e140] [cursor=pointer]:
          - generic [ref=e141]: Inmunidad y Regulación Inflamatoria
          - generic [ref=e142]: +
        - paragraph [ref=e143]: Fortalecemos las defensas naturales y modulamos la inflamación crónica que subyace a muchas enfermedades. Equilibramos la respuesta inmune para protección óptima sin sobreactivación.
      - generic [ref=e144]:
        - generic [ref=e145] [cursor=pointer]:
          - generic [ref=e146]: Salud Ósea y Musculoesquelética
          - generic [ref=e147]: +
        - paragraph [ref=e148]: Preservamos densidad ósea, función muscular y salud articular mediante nutrición específica, optimización hormonal y suplementación dirigida para mantener movilidad y fuerza con el tiempo.
      - generic [ref=e149]:
        - generic [ref=e150] [cursor=pointer]:
          - generic [ref=e151]: Deficiencia de vitamina D
          - generic [ref=e152]: +
        - paragraph [ref=e153]: Condición extremadamente común que afecta inmunidad, estado de ánimo y salud ósea. Corregimos niveles mediante suplementación adecuada y monitoreo para alcanzar rangos óptimos, no solo normales.
      - generic [ref=e154]:
        - generic [ref=e155] [cursor=pointer]:
          - generic [ref=e156]: Ferropenia sin anemia
          - generic [ref=e157]: +
        - paragraph [ref=e158]: Deficiencia de hierro que causa fatiga y bajo rendimiento incluso antes de desarrollar anemia. Restauramos reservas de hierro con terapia intravenosa para recuperación rápida y efectiva.
      - generic [ref=e159]:
        - generic [ref=e160] [cursor=pointer]:
          - generic [ref=e161]: Estilo de Vida y Hábitos
          - generic [ref=e162]: +
        - paragraph [ref=e163]: Los hábitos diarios determinan tu salud a largo plazo. Te guiamos en optimización de nutrición, ejercicio, manejo del estrés y rutinas que promueven longevidad basándonos en evidencia científica.
      - generic [ref=e164]:
        - generic [ref=e165] [cursor=pointer]:
          - generic [ref=e166]: Prevención Avanzada
          - generic [ref=e167]: +
        - paragraph [ref=e168]: Utilizamos biomarcadores avanzados, análisis genético y evaluaciones funcionales para identificar riesgos años antes de que aparezcan síntomas, permitiendo intervención temprana y prevención efectiva.
      - generic [ref=e169]:
        - generic [ref=e170] [cursor=pointer]:
          - generic [ref=e171]: Recuperación en deportes de alto rendimiento
          - generic [ref=e172]: +
        - paragraph [ref=e173]: Aceleramos recuperación muscular, reducimos inflamación y optimizamos rendimiento atlético mediante terapias intravenosas, nutrición deportiva avanzada y protocolos de recuperación personalizados.
      - generic [ref=e174]:
        - generic [ref=e175] [cursor=pointer]:
          - generic [ref=e176]: Recuperación post-cirugía
          - generic [ref=e177]: +
        - paragraph [ref=e178]: Aceleramos cicatrización, fortalecemos el sistema inmune y restauramos la función normal tras procedimientos quirúrgicos con nutrición intravenosa, antioxidantes y protocolos de regeneración tisular.
